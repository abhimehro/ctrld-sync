name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: uv sync --all-extras
      - name: Run tests with coverage
        run: uv run pytest tests/ -n auto -v --tb=short --cov=main --cov=fix_env --cov-report=term-missing --cov-report=xml
