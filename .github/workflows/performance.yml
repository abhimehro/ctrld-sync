name: Performance Tests

on:
  pull_request:
    paths:
      - "main.py"
      - "tests/test_performance_*.py"
      - "tests/test_benchmarks.py"
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run performance tests
        run: |
          uv run pytest tests/test_performance_regression.py \
            --benchmark-only \
            --benchmark-autosave \
            -v

      - name: Store performance regression results
        uses: actions/upload-artifact@v7
        with:
          name: performance-regression-results
          path: .benchmarks/
          include-hidden-files: true

      - name: Download previous benchmark data
        uses: actions/cache@v5
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-benchmark-

      - name: Run structured benchmark suite
        run: |
          uv run pytest tests/test_benchmarks.py \
            --benchmark-only \
            --benchmark-json=benchmark-results.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark-results.json
          fail-on-alert: true
          alert-threshold: "150%"
          external-data-json-path: ./cache/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload benchmark JSON artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.json
