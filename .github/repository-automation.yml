schema_version: 1
repository:
  default_branch: main
automation:
  human_review_label: needs-human-review
  protected_paths:
    - auth/**
    - migrations/**
    - database/**
    - api/**
  reporting:
    daily_issue_prefix: "[repo-automation] Daily Status Report"
    weekly_issue_prefix: "[repo-automation] Weekly Retrospective"
  workflow_updater:
    enabled: true
    create_draft_pr: true
    branch_prefix: automation/workflow-updates
    commit_message: "chore(actions): consolidate and refresh workflow dependencies"
    pr_title: "chore(actions): consolidate workflow automation"
    allowed_paths:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml
      - .github/actions/**/*.yml
      - .github/actions/**/*.yaml
  performance_optimizer:
    enabled: true
    setup_commands:
      - name: install uv
        run: python -m pip install --upgrade pip uv
        optional: false
        timeout_seconds: 900
    commands:
      - name: install project dependencies
        run: uv sync --all-extras
        optional: false
        timeout_seconds: 1800
      - name: performance regression suite
        run: uv run pytest tests/test_performance_regression.py --benchmark-only --benchmark-autosave -v
        optional: true
        timeout_seconds: 2400
      - name: structured benchmark suite
        run: uv run pytest tests/test_benchmarks.py --benchmark-only --benchmark-json=benchmark-results.json
        optional: true
        timeout_seconds: 2400
    suggestions:
      - Treat live Control D sync behaviour as production-sensitive; keep optimization work in dry-run or benchmark mode unless you explicitly approve a live change.
      - Review benchmark regressions together with cache and API request counts before opening any performance PR.
  quality_assurance:
    enabled: true
    setup_commands:
      - name: install uv
        run: python -m pip install --upgrade pip uv
        optional: false
        timeout_seconds: 900
    commands:
      - name: install project dependencies
        run: uv sync --all-extras
        optional: false
        timeout_seconds: 1800
      - name: ruff lint
        run: uv run ruff check .
        optional: false
        timeout_seconds: 1200
      - name: mypy type check
        run: uv run mypy main.py
        optional: false
        timeout_seconds: 1200
      - name: pytest with coverage
        run: uv run pytest tests/ -n auto -v --tb=short --cov=main --cov=fix_env --cov-report=term-missing
        optional: false
        timeout_seconds: 2400
      - name: pre-commit hygiene
        run: uv run pre-commit run --all-files
        optional: true
        timeout_seconds: 1800
      - name: dry-run sync smoke test
        run: uv run python main.py --dry-run --plan-json automation-plan.json
        optional: false
        timeout_seconds: 1200
  backlog_manager:
    enabled: true
    stale_days: 14
    max_issues: 10
    max_pull_requests: 10
    include_discussions: false
    create_tracking_issue: false
  status_report:
    enabled: true
    publish_issue: true
    labels: []
  weekly_retrospective:
    enabled: true
    publish_issue: true
    labels: []
    auto_apply_safe_changes: false
    branch_prefix: automation/weekly-workflow-tuning
    commit_message: "chore(actions): apply safe weekly automation tuning"
    allowed_paths:
      - .github/**
    safe_adjustment_commands: []
