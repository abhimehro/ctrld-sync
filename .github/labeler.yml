# Label PRs based on changed file paths (actions/labeler@v6 format)
documentation:
  - changed-files:
      - any-glob-to-any-file: ["**/*.md"]

configuration:
  - changed-files:
      - any-glob-to-any-file: ["**/*.yml", "**/*.yaml", ".github/**/*"]

scripts:
  - changed-files:
      - any-glob-to-any-file: ["**/*.sh", "**/*.bash"]

python:
  - changed-files:
      - any-glob-to-any-file: ["**/*.py", "pyproject.toml", "uv.lock"]
